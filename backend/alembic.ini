# A generic, single-database configuration.

[alembic]
# path to migration scripts
script_location = ../database/migrations

# template used to generate new migration files
# file_template = %%(rev)s_%%(slug)s

# timezone to use when rendering the date within the migration file
# timezone = UTC

# max length of characters to use for the "slug" field
# truncate_slug_length = 40

# set to 'true' to run the environment during the
# 'revision' command, regardless of autogenerate
# revision_environment = false

# set to 'true' to allow modules to be loaded with relative paths
# prepend_sys_path = true

# version location specification; this defaults
# to database/migrations/versions.  When using multiple version
# directories, initial paths must be specified.
# version_locations = %(here)s/bar:%(here)s/bat:database/migrations/versions

# version_path_separator = :

# set to 'true' to search for newer versions in alternative directories
# when running upgrade/downgrade commands
# recursive_version_lookup = false

# set to 'true' to check for schema discrepancies in autogenerate
# check_schema = false


[post_write_hooks]
# post_write_hooks defines scripts or tools that run after a revision is created.
# e.g., to run ruff formatter on the generated migration files:
# hooks = ruff
# ruff.type = console_scripts
# ruff.entrypoint = ruff
# ruff.options = format REVISION_SCRIPT_FILE

# Logging configuration
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = INFO
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine
# "level = INFO" logs SQL queries.
# "level = DEBUG" logs SQL queries and results.
# "level = WARN" logs neither.

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stdout,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(asctime)s [%(levelname)s] %(name)s: %(message)s
datefmt = %H:%M:%S
